<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #0d47a1, #1976d2);
    margin:0;
}
.container {
    background:white;
    padding:25px;
    margin:40px auto;
    max-width:500px;
    border-radius:15px;
}
input {
    width:100%;
    padding:12px;
    margin:8px 0;
}
button {
    background:#0d47a1;
    color:white;
    padding:14px;
    border:none;
    width:100%;
}
#toast {
position:fixed;
bottom:20px;
right:20px;
background:green;
color:white;
padding:15px;
display:none;
}
</style>
</head>

<body>

<h2 style="text-align:center;color:white;">Registration Form</h2>

<div class="container">
<form id="form">

<input type="text" name="name" placeholder="Name" required>
<input type="text" name="phone" placeholder="Phone" required>
<input type="text" name="passport" placeholder="Passport" required>
<input type="text" name="country" placeholder="Country" required>

<label>📸 Photo</label>
<input type="file" id="photo" accept="image/*">

<label>📄 Passport PDF</label>
<input type="file" id="passportFile" accept="application/pdf">

<button type="submit">Submit</button>

</form>
</div>

<div id="toast">✅ Sent Successfully</div>

<script>
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const photoFile = document.getElementById("photo").files[0];
  const pdfFile = document.getElementById("passportFile").files[0];

  let base64Photo = null;
  let base64PDF = null;

  // 📸 Photo
  if (photoFile) {
    const reader = new FileReader();
    base64Photo = await new Promise((resolve) => {
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.readAsDataURL(photoFile);
    });
  }

  // 📄 PDF
  if (pdfFile) {
    const reader = new FileReader();
    base64PDF = await new Promise((resolve) => {
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.readAsDataURL(pdfFile);
    });
  }

  const data = {
    name: e.target.name.value,
    phone: e.target.phone.value,
    passport: e.target.passport.value,
    country: e.target.country.value,
    photo: base64Photo,
    passportFile: base64PDF
  };

  await fetch("/.netlify/functions/send", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  document.getElementById("toast").style.display = "block";
  setTimeout(() => {
    document.getElementById("toast").style.display = "none";
  }, 3000);

});
</script>

</body>
</html>
