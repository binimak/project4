<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #0d47a1, #1976d2);
    margin:0;
}
.container {
    background:white;
    padding:25px;
    margin:40px auto;
    max-width:500px;
    border-radius:15px;
}
input {
    width:100%;
    padding:12px;
    margin:8px 0;
}
button {
    background:#0d47a1;
    color:white;
    padding:14px;
    border:none;
    width:100%;
}
#toast {
position:fixed;
bottom:20px;
right:20px;
background:green;
color:white;
padding:15px;
display:none;
}
</style>

</head>

<body>

<h2 style="text-align:center;color:white;">Registration Form</h2>

<div class="container">
<form id="form">

<input type="text" id="name" placeholder="Name" required>
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="passport" placeholder="Passport">
<input type="text" id="country" placeholder="Country">

<label>📸 Photo</label>
<input type="file" id="photo">

<label>📄 Passport PDF</label>
<input type="file" id="passportFile">

<button type="submit">Submit</button>

</form>
</div>

<div id="toast">✅ Sent Successfully</div>

<!-- ✅ IMPORTANT: script ከዚህ በታች -->
<script>
const form = document.getElementById("form");
const toast = document.getElementById("toast");

form.onsubmit = async (e)=>{
e.preventDefault();

const toBase64 = file => new Promise((res)=>{
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = ()=> res(reader.result.split(",")[1]);
});

let photoBase64 = "";
let pdfBase64 = "";

if(photo.files[0]){
  photoBase64 = await toBase64(photo.files[0]);
}

if(passportFile.files[0]){
  pdfBase64 = await toBase64(passportFile.files[0]);
}

await fetch("/.netlify/functions/send", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    name: name.value,
    phone: phone.value,
    passport: passport.value,
    country: country.value,
    photo: photoBase64,
    passportFile: pdfBase64
  })
});

toast.style.display="block";
setTimeout(()=>toast.style.display="none",3000);
};
</script>

</body>
</html>
