<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #0d47a1, #1976d2);
    margin:0;
}

.container {
    background:white;
    padding:25px;
    margin:40px auto;
    max-width:500px;
    border-radius:15px;
}

input {
    width:100%;
    padding:12px;
    margin:8px 0;
}

button {
    background:#0d47a1;
    color:white;
    padding:14px;
    border:none;
    width:100%;
}

#preview {width:100px; display:none; margin:auto;}

#toast {
position:fixed;
bottom:20px;
right:20px;
background:green;
color:white;
padding:15px;
display:none;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){ emailjs.init("YOUR_PUBLIC_KEY"); })();
</script>

</head>

<body>

<h2 style="text-align:center;color:white;">Registration Form</h2>

<div class="container">

<form id="form">

<input type="text" id="name" placeholder="Name" required>
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="passport" placeholder="Passport">
<input type="text" id="country" placeholder="Country">

<label>📸 Photo</label>
<input type="file" id="photo">
<img id="preview">

<label>📄 Passport PDF</label>
<input type="file" id="passportFile">

<label>🎓 Education PDF</label>
<input type="file" id="eduFile">

<button type="submit">Submit</button>

</form>

</div>

<div id="toast">✅ Sent Successfully</div>

<script>
let token = "@elmiscodesenderbot";
let token = "8730065441:AAHHcRx93S5dIbOenYeIcYfvKDz1K3rHRYk";
// preview
photo.onchange = ()=>{
let file = photo.files[0];
if(file){
preview.src = URL.createObjectURL(file);
preview.style.display="block";
}
};

form.onsubmit = async (e)=>{
e.preventDefault();

let text = `New User:
Name: ${name.value}
Phone: ${phone.value}
Passport: ${passport.value}
Country: ${country.value}`;

// Telegram text
await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id,text})
});

// Photo
let file = photo.files[0];
if(file){
let fd = new FormData();
fd.append("chat_id",chat_id);
fd.append("photo",file);

await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
method:"POST",
body:fd
});
}

// PDF
let doc = passportFile.files[0];
if(doc){
let fd = new FormData();
fd.append("chat_id",chat_id);
fd.append("document",doc);

await fetch(`https://api.telegram.org/bot${token}/sendDocument`, {
method:"POST",
body:fd
});
}

// Email
emailjs.send("YOUR_SERVICE","YOUR_TEMPLATE",{
name:name.value,
phone:phone.value
});

// toast
toast.style.display="block";
setTimeout(()=>toast.style.display="none",3000);

};
</script>

</body>
</html>
