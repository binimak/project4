<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #0d47a1, #1976d2);
    margin:0;
}
.container {
    background:white;
    padding:25px;
    margin:40px auto;
    max-width:500px;
    border-radius:15px;
}
input {
    width:100%;
    padding:12px;
    margin:8px 0;
}
button {
    background:#0d47a1;
    color:white;
    padding:14px;
    border:none;
    width:100%;
}
#toast {
position:fixed;
bottom:20px;
right:20px;
background:green;
color:white;
padding:15px;
display:none;
}
</style>
</head>

<body>

<h2 style="text-align:center;color:white;">Registration Form</h2>

<div class="container">
<form id="form">

<input type="text" name="name" placeholder="Name" required>
<input type="text" name="phone" placeholder="Phone" required>
<input type="text" name="passport" placeholder="Passport" required>
<input type="text" name="country" placeholder="Country" required>

<label>📸 ጉርድ ፎቶ</label>
<input type="file" id="photo1" accept="image/*" required>

<label>📄 ፓስፖርት</label>
<input type="file" id="photo2" accept="image/*" required>

<label>🪪 መታወቂያ</label>
<input type="file" id="photo3" accept="image/*" required>

<button type="submit" id="btn">Submit</button>

</form>
</div>

<div id="toast">✅ Sent Successfully</div>

<script>
let sending = false;

const toBase64 = (file) => new Promise((resolve) => {
  const reader = new FileReader();
  reader.onload = () => resolve(reader.result.split(",")[1]);
  reader.readAsDataURL(file);
});

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  if (sending) return;
  sending = true;

  document.getElementById("btn").disabled = true;

  const p1 = document.getElementById("photo1").files[0];
  const p2 = document.getElementById("photo2").files[0];
  const p3 = document.getElementById("photo3").files[0];

  const base1 = await toBase64(p1);
  const base2 = await toBase64(p2);
  const base3 = await toBase64(p3);

  const data = {
    name: e.target.name.value,
    phone: e.target.phone.value,
    passport: e.target.passport.value,
    country: e.target.country.value,
    photo1: base1,
    photo2: base2,
    photo3: base3
  };

  await fetch("/.netlify/functions/send", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  document.getElementById("toast").style.display = "block";

  setTimeout(() => {
    document.getElementById("toast").style.display = "none";
    document.getElementById("btn").disabled = false;
    sending = false;
  }, 3000);
});
</script>

</body>
</html>
