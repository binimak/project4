<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #0d47a1, #1976d2);
    margin:0;
}
.container {
    background:white;
    padding:25px;
    margin:40px auto;
    max-width:500px;
    border-radius:15px;
}
input {
    width:100%;
    padding:12px;
    margin:8px 0;
}
button {
    background:#0d47a1;
    color:white;
    padding:14px;
    border:none;
    width:100%;
}
#toast {
position:fixed;
bottom:20px;
right:20px;
background:green;
color:white;
padding:15px;
display:none;
}
</style>

</head>

<body>

<h2 style="text-align:center;color:white;">Registration Form</h2>

<div class="container">
<form id="form">

<input type="text" id="name" placeholder="Name" required>
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="passport" placeholder="Passport">
<input type="text" id="country" placeholder="Country">

<label>📸 Photo</label>
<input type="file" id="photo">

<label>📄 Passport PDF</label>
<input type="file" id="passportFile">

<button type="submit">Submit</button>

</form>
</div>

<div id="toast">✅ Sent Successfully</div>

<!-- ✅ IMPORTANT: script ከዚህ በታች -->
<form id="form">
  <input name="name" placeholder="Name" required><br>
  <input name="phone" placeholder="Phone" required><br>
  <input name="passport" placeholder="Passport" required><br>
  <input name="country" placeholder="Country" required><br>

  <input type="file" id="photo" accept="image/*"><br>

  <button type="submit">Send</button>
</form>

<script>
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("photo").files[0];

  let base64Photo = null;

  if (file) {
    const reader = new FileReader();

    base64Photo = await new Promise((resolve) => {
      reader.onload = () => {
        resolve(reader.result.split(",")[1]);
      };
      reader.readAsDataURL(file);
    });
  }

  const data = {
    name: e.target.name.value,
    phone: e.target.phone.value,
    passport: e.target.passport.value,
    country: e.target.country.value,
    photo: base64Photo
  };

  await fetch("/.netlify/functions/send", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("Sent!");
});
</script>
</body>
</html>
