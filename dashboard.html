<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}

.top{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

input{
padding:10px;
width:250px;
}

button{
padding:10px;
background:#0d47a1;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#0d47a1;
color:white;
}
</style>
</head>

<body>

<script>
// 🔐 protect page
if(localStorage.getItem("admin") !== "true"){
window.location.href="login.html";
}
</script>

<div class="top">
<input type="text" id="search" placeholder="Search name...">
<div>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Passport</th>
<th>Country</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];

const load = async () => {
const snap = await getDocs(collection(db,"users"));
const table = document.querySelector("tbody");

table.innerHTML = "";

snap.forEach(d => {
let data = d.data();
data.id = d.id;
allData.push(data);

table.innerHTML += `
<tr>
<td>${data.name}</td>
<td>${data.phone}</td>
<td>${data.passport}</td>
<td>${data.country}</td>
<td><button onclick="del('${data.id}')">Delete</button></td>
</tr>
`;
});
};

window.del = async (id)=>{
if(confirm("Delete user?")){
await deleteDoc(doc(db,"users",id));
location.reload();
}
};

window.logout = ()=>{
localStorage.removeItem("admin");
location.href="login.html";
};

window.exportExcel = ()=>{
let csv = "Name,Phone,Passport,Country\n";

allData.forEach(u=>{
csv += `${u.name},${u.phone},${u.passport},${u.country}\n`;
});

let blob = new Blob([csv], {type:"text/csv"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "users.csv";
a.click();
};

// 🔍 search
document.getElementById("search").addEventListener("input", function(){
let val = this.value.toLowerCase();
let rows = document.querySelectorAll("tbody tr");

rows.forEach(r=>{
r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
});
});

load();

</script>

</body>
</html>
