<!DOCTYPE html>
<html>
<body style="text-align:center;">

<h2>Profile</h2>

<img id="img" width="120"><br>
<h3 id="name"></h3>
<p id="phone"></p>

<script>
let u = JSON.parse(localStorage.getItem("user"));

img.src = u.photo;
name.innerText = u.name;
phone.innerText = u.phone;
</script>

</body>
</html>
